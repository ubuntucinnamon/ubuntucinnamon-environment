<html>
    <head>
        <style>
            body {
                height: 600px;
            }

            p {
                margin-top: 10px;
            }

            .h1 {
                font-size: 40px;
            }

            .content-margin {
                padding: 50px 0 0 50px;
            }

            .content-image {
                padding-top: 50px;
                padding-left: 10px;
                width: 480px;
            }

            .icon {
                height: 20px;
                padding-right: 10px;
            }

            .spacing {
                padding: 20px 10px 20px 0;
            }

            .pad-right {
                padding-right: 20px;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <td class="content-margin">
                    <p class="h1">Productivity built in</p>
                    <p class="spacing">The LibreOffice suite can be used for all your work needs.</p>
                    <table>
                        <tr>
                            <td>
                                <img
                                    class="icon"
                                    src="../icons/libreoffice-calc.png"
                                />
                            </td>
                            <td class="pad-right">LibreOffice Calc</td>
                        </tr>
                        <tr>
                            <td>
                                <img
                                    class="icon"
                                    src="../icons/libreoffice-draw.png"
                                />
                            </td>
                            <td class="pad-right">LibreOffice Draw</td>
                        </tr>
                        <tr>
                            <td>
                                <img
                                    class="icon"
                                    src="../icons/libreoffice-impress.png"
                                />
                            </td>
                            <td class="pad-right">LibreOffice Impress</td>
                        </tr>
                        <tr>
                            <td>
                                <img
                                    class="icon"
                                    src="../icons/libreoffice-math.png"
                                />
                            </td>
                            <td class="pad-right">LibreOffice Math</td>
                        </tr>
                        <tr>
                            <td>
                                <img
                                    class="icon"
                                    src="../icons/libreoffice-writer.png"
                                />
                            </td>
                            <td class="pad-right">LibreOffice Writer</td>
                        </tr>
                    </table>
                </td>
                <td>
                    <img class="content-image" src="libreoffice.png" />
                </td>
            </tr>
        </table>
    </body>
</html>
